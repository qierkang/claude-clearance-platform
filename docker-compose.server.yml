services:
  claude-clearance-app:
    image: claude-clearance-app:20260706
    container_name: claude-clearance-app
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4321
      PUBLIC_SITE_URL: http://claude.qekang.com
      DATABASE_URL: postgres://claude_clearance:${POSTGRES_PASSWORD}@host.docker.internal:5432/claude_clearance
      PUBLIC_GA_ID: ${PUBLIC_GA_ID:-}
    ports:
      - "17063:4321"
